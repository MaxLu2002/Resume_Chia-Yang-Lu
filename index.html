<!DOCTYPE html>
<html lang="zh-TW" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-lang-key="pageTitle"></title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=Manrope:wght@300;400;500;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-base: #050505;
            --grid-line-main: rgba(255, 255, 255, 0.05);
            --grid-line-sub: rgba(255, 255, 255, 0.02);
            --accent: #ff6b00;
            --accent-glow: rgba(255, 107, 0, 0.3);
            --text-heading: #ffffff;
            --text-body: #B0B5C0;
            --box-bg: rgba(14, 15, 18, 0.85);
            --box-border: rgba(255, 255, 255, 0.08);
        }

        body {
            font-family: 'Manrope', sans-serif;
            background-color: var(--bg-base);
            /* Architectural dual-layered grid */
            background-image:
                linear-gradient(var(--grid-line-main) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-line-main) 1px, transparent 1px),
                linear-gradient(var(--grid-line-sub) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-line-sub) 1px, transparent 1px);
            background-size: 100px 100px, 100px 100px, 20px 20px, 20px 20px;
            background-position: -1px -1px;
            color: var(--text-body);
            font-size: 1.15rem;
            line-height: 1.7;
            overflow-x: hidden;
        }

        /* Essential Typography */
        h1,
        h2,
        h3,
        .font-tech,
        .nav-text {
            font-family: 'Chakra Petch', sans-serif;
            text-transform: uppercase;
        }

        .accent-glow {
            color: var(--accent);
            text-shadow: 0 0 15px var(--accent-glow);
        }

        /* Staggered Reveal Animation */
        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .reveal {
            opacity: 0;
            animation: fadeSlideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .delay-1 {
            animation-delay: 0.1s;
        }

        .delay-2 {
            animation-delay: 0.2s;
        }

        .delay-3 {
            animation-delay: 0.3s;
        }

        .delay-4 {
            animation-delay: 0.4s;
        }

        .delay-5 {
            animation-delay: 0.5s;
        }

        /* Navigation Mechanics */
        .nav-link {
            position: relative;
            display: inline-flex;
            align-items: center;
            gap: 1.5rem;
            cursor: pointer;
        }

        .nav-link .nav-indicator {
            height: 2px;
            width: 25px;
            background: #333;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .nav-link:hover .nav-indicator {
            width: 50px;
            background: #666;
        }

        .nav-link.active .nav-indicator {
            width: 75px;
            background: var(--accent);
            box-shadow: 0 0 10px var(--accent-glow);
        }

        .nav-link .nav-text {
            color: #555;
            font-size: 0.95rem;
            font-weight: 600;
            letter-spacing: 2px;
            transition: color 0.4s;
        }

        .nav-link:hover .nav-text {
            color: #aaa;
        }

        .nav-link.active .nav-text {
            color: var(--accent);
            text-shadow: 0 0 8px var(--accent-glow);
        }

        /* Cyber/Tech Component Styling */
        .tech-box {
            background: var(--box-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--box-border);
            border-left: 4px solid #1a1a1a;
            padding: 2rem;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
        }

        .tech-box:hover {
            border-color: rgba(255, 255, 255, 0.15);
            border-left-color: var(--accent);
            background: rgba(20, 22, 26, 0.95);
            transform: translate(-5px, -5px);
            /* Solid sharp shadow for brutalist tech feel */
            box-shadow: 8px 8px 0px rgba(255, 107, 0, 0.15);
        }

        /* High-tech Button */
        .btn-tech {
            font-family: 'Chakra Petch', sans-serif;
            position: relative;
            background: transparent;
            color: var(--accent);
            border: 1px solid var(--accent);
            padding: 0.75rem 2rem;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            overflow: hidden;
            transition: all 0.3s ease;
            clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
        }

        .btn-tech::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: var(--accent);
            transition: all 0.3s ease;
            z-index: -1;
        }

        .btn-tech:hover {
            color: #000;
            font-weight: 700;
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .btn-tech:hover::before {
            left: 0;
        }

        /* Minimalist Avatar Glow */
        .avatar-glow {
            position: relative;
            z-index: 1;
        }

        .avatar-glow::before {
            content: '';
            position: absolute;
            inset: -8px;
            border-radius: 50%;
            background: radial-gradient(circle, var(--accent) 0%, transparent 70%);
            opacity: 0.15;
            z-index: -1;
            filter: blur(15px);
            transition: opacity 0.5s ease;
        }

        .avatar-glow:hover::before {
            opacity: 0.4;
            filter: blur(20px);
        }

        /* Badge Styling */
        .tech-badge {
            font-family: 'Chakra Petch', sans-serif;
            background: rgba(255, 107, 0, 0.05);
            color: var(--accent);
            border: 1px solid rgba(255, 107, 0, 0.2);
            padding: 0.3rem 1rem;
            font-size: 0.85rem;
            letter-spacing: 1px;
            transition: all 0.3s;
        }

        .tech-badge:hover {
            background: rgba(255, 107, 0, 0.15);
            border-color: var(--accent);
            box-shadow: 0 0 10px var(--accent-glow);
        }

        /* Social Icons */
        .social-link img {
            filter: grayscale(100%) opacity(0.6);
            transition: all 0.3s ease;
        }

        .social-link:hover img {
            filter: grayscale(0%) sepia(100%) hue-rotate(-10deg) saturate(500%) opacity(1);
            transform: translateY(-3px);
        }

        /* Scrollbar hiding styles for left panel */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
